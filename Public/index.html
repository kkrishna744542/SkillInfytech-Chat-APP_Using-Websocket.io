<!DOCTYPE html>
<html>
<head>
    <title>Realtime Chat</title>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 200px; background: #eee; padding: 10px; border-right: 1px solid #ccc; }
        #chat-container { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; list-style: none; }
        #form { display: flex; padding: 10px; background: #ddd; }
        input { flex: 1; padding: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Online Users</h3>
    <ul id="user-list"></ul>
</div>

<div id="chat-container">
    <ul id="messages"></ul>
    <form id="form">
        <input id="input" autocomplete="off" placeholder="Type a message..." /><button>Send</button>
    </form>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io("https://skillinfytech-chat-app-using-websocket-io.onrender.com", {
  transports: ["websocket"] 
});
    const username = prompt("Enter your name:") || "Anonymous";

    // Tell the server we joined
    socket.emit('user joined', username);

    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');
    const userList = document.getElementById('user-list');

    // Emit message to server
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (input.value) {
            socket.emit('chat message', input.value);
            input.value = '';
        }
    });

    // Listen for incoming messages (Real-time update)
    socket.on('chat message', (data) => {
        const item = document.createElement('li');
        item.innerHTML = `**${data.user}**: ${data.text}`;
        messages.appendChild(item);
        messages.scrollTop = messages.scrollHeight;
    });

    // Update the online users list
    socket.on('status update', (users) => {
        userList.innerHTML = '';
        users.forEach(user => {
            const li = document.createElement('li');
            li.textContent = `🟢 ${user}`;
            userList.appendChild(li);
        });
    });
</script>
</body>
</html>
